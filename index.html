<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIOS 选项管理器 - Redfish Attribute Registry</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div id="app">
    <!-- 工具栏 -->
    <header id="toolbar">
        <span id="app-title">BIOS 选项管理器</span>
        <div id="toolbar-left">
            <!-- 数据下拉 -->
            <div id="dropdown-data" class="dropdown">
                <button id="btn-data-menu" class="btn btn-secondary dropdown-toggle">数据</button>
                <div class="dropdown-menu">
                    <button class="dropdown-item" data-action="import">📂 导入文件</button>
                    <button class="dropdown-item" data-action="load-demo">📋 加载示例</button>
                    <div class="dropdown-divider"></div>
                    <button class="dropdown-item" data-action="export-excel">📥 导出 Excel</button>
                    <button class="dropdown-item" data-action="export-json">📄 导出 JSON</button>
                    <div class="dropdown-divider"></div>
                    <button class="dropdown-item" data-action="export-template">📋 导出实例模板</button>
                </div>
            </div>
            <!-- 操作下拉 -->
            <div id="dropdown-actions" class="dropdown">
                <button id="btn-actions-menu" class="btn btn-secondary dropdown-toggle">操作</button>
                <div class="dropdown-menu">
                    <button class="dropdown-item" data-action="open-system-manager">📋 机型管理</button>
                </div>
            </div>
        </div>
        <div id="toolbar-center">
            <div id="search-wrapper">
                <input id="search-input" type="text" placeholder="搜索属性名称、描述…" />
                <button id="btn-clear-search" class="hidden" title="清除搜索">×</button>
            </div>
        </div>
        <div id="toolbar-right">
            <span id="modified-count">未修改</span>
            <div id="toolbar-user">
                <div id="dropdown-user" class="dropdown">
                    <button id="btn-login" class="btn btn-small btn-secondary" title="登录">🔒 登录</button>
                    <div class="dropdown-menu">
                        <button class="dropdown-item" data-action="logout">🚪 退出登录</button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- 主体 -->
    <div id="main-container">
        <!-- 首页视图 -->
        <div id="homepage" class="hidden">
            <div class="homepage-header">
                <div class="homepage-header-bg"></div>
                <div class="homepage-header-content">
                    <h2>BIOS 选项管理器</h2>
                    <p>Redfish AttributeRegistry 多机型配置管理平台</p>
                    <div class="homepage-actions">
                        <button class="btn btn-primary btn-homepage-action" onclick="AppState.handleImport()">📂 导入配置</button>
                        <button class="btn btn-secondary btn-homepage-action" onclick="AppState.loadDemoData()">📋 加载示例</button>
                    </div>
                </div>
            </div>
            <div class="homepage-toolbar">
                <span class="homepage-count" id="homepage-count"></span>
            </div>
            <div id="system-cards" class="system-cards"></div>
        </div>

        <!-- 机型详情视图 -->
        <div id="detail-view" class="hidden">
            <!-- 侧边栏 -->
            <aside id="sidebar">
                <div id="system-selector">
                    <button id="btn-back-home" class="btn btn-small" title="返回首页">← 首页</button>
                    <span id="current-system-name" class="current-system-name">-- 选择机型 --</span>
                    <div id="dropdown-system-more" class="dropdown right">
                        <button id="btn-system-more" title="更多操作">⋮</button>
                        <div class="dropdown-menu">
                            <button class="dropdown-item danger" data-action="delete-system">🗑 删除当前机型</button>
                        </div>
                    </div>
                </div>
                <!-- 版本管理面板 -->
                <div id="version-panel">
                    <div class="version-panel-header">
                        <span class="version-label">版本管理</span>
                        <button id="btn-save-version" class="btn btn-small btn-primary" title="保存为新版本">💾 保存版本</button>
                    </div>
                    <div id="version-list" class="version-list">
                        <div class="version-empty">暂无保存的版本</div>
                    </div>
                </div>
                <nav id="menu-tree">
                    <div class="menu-label-row">
                        <span class="menu-label">菜单导航</span>
                        <button id="btn-add-menu" title="添加自定义菜单">+</button>
                    </div>
                </nav>
            </aside>

            <!-- 内容 -->
            <section id="content">
                <div id="content-header">
                    <div>
                        <span id="current-menu-path">所有属性</span>
                        <span id="result-count"></span>
                    </div>
                    <div id="content-header-actions">
                        <button id="btn-column-settings" class="btn btn-secondary btn-small" title="列设置">⚙ 列设置</button>
                        <button id="btn-add-attr" class="btn btn-primary btn-small">＋ 添加选项</button>
                    </div>
                </div>
                <!-- 筛选栏 -->
                <div id="filter-bar">
                    <input id="filter-attr" type="text" placeholder="属性标识..." title="属性标识筛选" />
                    <select id="filter-type"><option value="">全部类型</option><option value="Enumeration">枚举</option><option value="String">字符串</option><option value="Integer">整数</option><option value="Boolean">布尔</option><option value="Password">密码</option></select>
                    <select id="filter-scope"><option value="">全部适用客户</option></select>
                    <select id="filter-platform"><option value="">全部平台</option></select>
                    <select id="filter-readonly"><option value="">是否只读</option><option value="1">是</option><option value="0">否</option></select>
                    <select id="filter-redfish"><option value="">是否支持Redfish</option><option value="1">是</option><option value="0">否</option></select>
                    <button id="btn-clear-filter" class="btn btn-small" title="清除所有筛选">清除筛选</button>
                </div>
                <div id="active-filters"></div>
                <div id="attribute-table-container">
                    <table id="attribute-table">
                        <colgroup id="attribute-table-colgroup">
                            <col><col><col><col><col><col>
                            <col><col><col><col><col><col>
                            <col>
                        </colgroup>
                        <thead>
                            <tr>
                                <th>菜单路径</th>
                                <th>属性标识</th>
                                <th>显示名称</th>
                                <th>中文名称</th>
                                <th>默认值</th>
                                <th>可选值</th>
                                <th>适用客户</th>
                                <th title="支持Redfish">Redfish</th>
                                <th title="支持Unicfg">Unicfg</th>
                                <th>只读</th>
                                <th>平台</th>
                                <th>说明</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="attribute-tbody"></tbody>
                    </table>
                    <div id="empty-state" class="hidden">
                        <div class="empty-icon">📋</div>
                        <p>请导入 BIOS 配置文件或加载示例数据</p>
                        <p style="font-size:12px;">支持 .json / .json.gz / .xlsx 格式</p>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <!-- 模态框 -->
    <div id="modal-overlay" class="hidden">
        <div id="modal-container">
            <div id="modal-header">
                <h3 id="modal-title"></h3>
                <button id="modal-close">&times;</button>
            </div>
            <div id="modal-body"></div>
            <div id="modal-footer">
                <button id="modal-cancel" class="btn">取消</button>
                <button id="modal-confirm" class="btn btn-primary">确认</button>
            </div>
        </div>
    </div>

    <!-- 通知 -->
    <div id="notification-container"></div>
</div>

<!-- 本地库文件 -->
<script src="js/xlsx.full.min.js"></script>
<script src="js/pako.min.js"></script>

<!-- 应用模块 -->
<script src="js/models.js"></script>
<script src="js/storage.js"></script>
<script src="js/parser.js"></script>
<script src="js/menu-tree.js"></script>
<script src="js/dependency-engine.js"></script>
<script src="js/editors.js"></script>
<script src="js/ui-common.js"></script>
<script src="js/ui-sidebar.js"></script>
<script src="js/ui-table.js"></script>
<script src="js/ui-forms.js"></script>
<script src="js/ui-renderer.js"></script>
<script src="js/export.js"></script>
<script src="js/auth.js"></script>
<script src="js/system-manager.js"></script>
<script src="js/demo-data.js"></script>
<script src="js/app.js"></script>

</body>
</html>
